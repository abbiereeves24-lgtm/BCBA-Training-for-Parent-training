<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParentBridge — BCBA Parent Training Mastery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F1117;
      --bg-card: #181B24;
      --bg-card-hover: #1E2230;
      --surface: #252A38;
      --border: #2A3045;
      --text: #E8EAF0;
      --text-muted: #8B90A3;
      --text-dim: #5C6178;
      --accent: #6EE7B7;
      --accent-glow: rgba(110, 231, 183, 0.15);
      --accent-deep: #10B981;
      --warm: #F59E0B;
      --warm-glow: rgba(245, 158, 11, 0.12);
      --coral: #FB7185;
      --coral-glow: rgba(251, 113, 133, 0.12);
      --sky: #7DD3FC;
      --sky-glow: rgba(125, 211, 252, 0.12);
      --violet: #A78BFA;
      --violet-glow: rgba(167, 139, 250, 0.12);
      --radius: 12px;
      --radius-lg: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Hero section ── */
    .hero {
      position: relative;
      padding: 100px 40px 80px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(110, 231, 183, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--accent-glow);
      border: 1px solid rgba(110, 231, 183, 0.2);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease-out;
    }

    .hero-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 20px;
      animation: fadeDown 0.7s ease-out 0.1s both;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 300;
      animation: fadeDown 0.7s ease-out 0.2s both;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      animation: fadeDown 0.7s ease-out 0.35s both;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat .num {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
    }

    .hero-stat .label {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Progress bar ── */
    .progress-bar-container {
      max-width: 1100px;
      margin: 0 auto 60px;
      padding: 0 40px;
      animation: fadeDown 0.7s ease-out 0.45s both;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .progress-header .title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .progress-header .percent {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-deep), var(--accent));
      border-radius: 100px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Navigation tabs ── */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 0 40px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .nav-tab {
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .nav-tab:hover {
      color: var(--text);
      background: var(--surface);
    }

    .nav-tab.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-color: rgba(110, 231, 183, 0.2);
    }

    /* ── Main content ── */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 100px;
    }

    /* ── Section header ── */
    .section-block {
      margin-bottom: 56px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .section-icon.green { background: var(--accent-glow); }
    .section-icon.warm { background: var(--warm-glow); }
    .section-icon.coral { background: var(--coral-glow); }
    .section-icon.sky { background: var(--sky-glow); }
    .section-icon.violet { background: var(--violet-glow); }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
    }

    .section-subtitle {
      font-size: 0.88rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── Module cards ── */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .module-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .module-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(110, 231, 183, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .module-card:hover::before { opacity: 1; }

    .module-card.completed {
      border-color: rgba(110, 231, 183, 0.2);
    }

    .module-card.completed::after {
      content: '';
      position: absolute;
      top: 16px;
      right: 16px;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    .module-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .module-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      background: var(--surface);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .module-duration {
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .module-title {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .module-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .module-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .module-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .module-tag {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .module-tag.green { background: var(--accent-glow); color: var(--accent); }
    .module-tag.warm { background: var(--warm-glow); color: var(--warm); }
    .module-tag.coral { background: var(--coral-glow); color: var(--coral); }
    .module-tag.sky { background: var(--sky-glow); color: var(--sky); }
    .module-tag.violet { background: var(--violet-glow); color: var(--violet); }

    .module-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
      background: transparent;
    }

    .module-check:hover {
      border-color: var(--accent);
    }

    .module-check.checked {
      background: var(--accent);
      border-color: var(--accent);
      animation: checkBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .module-check.checked svg {
      stroke: var(--bg);
    }

    .module-check svg {
      width: 14px;
      height: 14px;
      stroke: transparent;
      stroke-width: 2.5;
      fill: none;
      transition: stroke 0.2s;
    }

    @keyframes checkBounce {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ── Expanded module panel ── */
    .module-expanded {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      animation: fadeIn 0.25s ease;
    }

    .module-expanded.open { display: flex; align-items: center; justify-content: center; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .module-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 44px;
      position: relative;
      animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .panel-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .panel-close:hover { background: var(--border); color: var(--text); }

    .panel-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .panel-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .panel-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .panel-body h3 {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin: 24px 0 10px;
    }

    .panel-body p, .panel-body li {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .panel-body ul {
      padding-left: 20px;
    }

    .panel-body li {
      margin-bottom: 6px;
    }

    .panel-body li::marker {
      color: var(--accent);
    }

    .panel-actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: #86EFAC;
      box-shadow: 0 4px 20px rgba(110, 231, 183, 0.3);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
    }

    .btn-secondary:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero { padding: 70px 20px 60px; }
      .hero-stats { gap: 28px; }
      .content { padding: 0 20px 80px; }
      .progress-bar-container { padding: 0 20px; }
      .nav-tabs { padding: 0 16px; }
      .modules-grid { grid-template-columns: 1fr; }
      .module-panel { padding: 28px; width: 95%; }
      .panel-title { font-size: 1.4rem; }
      .hero-stats { flex-wrap: wrap; }
    }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 24px;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 2000;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast-icon {
      color: var(--accent);
      font-size: 1.1rem;
    }

    /* ── Reset button ── */
    .reset-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      z-index: 100;
    }

    .reset-btn:hover {
      color: var(--coral);
      border-color: rgba(251, 113, 133, 0.3);
      background: var(--coral-glow);
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-badge">BCBA Professional Development</div>
    <h1>Master the Art of<br><em>Parent Training</em></h1>
    <p>A structured, evidence-based course to help BCBAs deliver exceptional parent training sessions that create lasting change.</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="num" id="totalModules">24</div>
        <div class="label">Modules</div>
      </div>
      <div class="hero-stat">
        <div class="num">5</div>
        <div class="label">Sections</div>
      </div>
      <div class="hero-stat">
        <div class="num" id="completedCount">0</div>
        <div class="label">Completed</div>
      </div>
    </div>
  </section>

  <!-- Overall progress -->
  <div class="progress-bar-container">
    <div class="progress-header">
      <span class="title">Course Progress</span>
      <span class="percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Navigation tabs -->
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-section="all">All Modules</button>
    <button class="nav-tab" data-section="foundations">Foundations</button>
    <button class="nav-tab" data-section="assessment">Assessment</button>
    <button class="nav-tab" data-section="teaching">Teaching Strategies</button>
    <button class="nav-tab" data-section="behavior">Behavior Management</button>
    <button class="nav-tab" data-section="advanced">Advanced Topics</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Expanded module panel -->
  <div class="module-expanded" id="expandedPanel">
    <div class="module-panel" id="modulePanel">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div id="panelContent"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toastText"></span>
  </div>

  <!-- Reset button -->
  <button class="reset-btn" onclick="resetProgress()">Reset Progress</button>

<script>
const COURSE_DATA = {
  foundations: {

          keyTopics: [

      },
      {
        id: "f5",

// State
let completedModules = JSON.parse(localStorage.getItem('parentbridge_completed') || '[]');
let activeSection = 'all';

function getAllModules() {
  const all = [];
  Object.values(COURSE_DATA).forEach(section => {
    section.modules.forEach(m => all.push(m));
  });
  return all;
}

function updateProgress() {
  const total = getAllModules().length;
  const completed = completedModules.length;
  const percent = Math.round((completed / total) * 100);

  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('completedCount').textContent = completed;
  document.getElementById('totalModules').textContent = total;

  localStorage.setItem('parentbridge_completed', JSON.stringify(completedModules));
}

function toggleModule(moduleId, event) {
  event.stopPropagation();
  const idx = completedModules.indexOf(moduleId);
  if (idx > -1) {
    completedModules.splice(idx, 1);
    showToast('Module unmarked');
  } else {
    completedModules.push(moduleId);
    showToast('Module completed! 🎉');
  }
  updateProgress();
  renderContent();
}

function openPanel(moduleId) {
  let module = null;
  Object.values(COURSE_DATA).forEach(section => {
    section.modules.forEach(m => {
      if (m.id === moduleId) module = m;
    });
  });
  if (!module) return;

  const isCompleted = completedModules.includes(module.id);
  const d = module.details;

  document.getElementById('panelContent').innerHTML = `
    <div class="panel-number">Module ${module.num}</div>
    <div class="panel-title">${module.title}</div>
    <div class="panel-meta">
      <span>⏱ ${module.duration}</span>
      <span>${isCompleted ? '✅ Completed' : '○ Not started'}</span>
    </div>
    <div class="panel-body">
      <h3>Overview</h3>
      <p>${d.overview}</p>
      <h3>Learning Objectives</h3>
      <ul>${d.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
      <h3>Key Topics</h3>
      <ul>${d.keyTopics.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" onclick="toggleModule('${module.id}', event); renderContent(); updatePanelButton('${module.id}');">
        ${isCompleted ? 'Mark as Incomplete' : 'Mark as Complete'}
      </button>
      <button class="btn btn-secondary" onclick="closePanel()">Close</button>
    </div>
  `;

  document.getElementById('expandedPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('expandedPanel').classList.remove('open');
  document.body.style.overflow = '';
}

function updatePanelButton(moduleId) {
  // Re-open to refresh state
  openPanel(moduleId);
}

function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function resetProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    completedModules = [];
    updateProgress();
    renderContent();
    showToast('Progress reset');
  }
}

function renderContent() {
  const container = document.getElementById('content');
  let html = '';

  const sections = activeSection === 'all'
    ? Object.entries(COURSE_DATA)
    : Object.entries(COURSE_DATA).filter(([key]) => key === activeSection);

  sections.forEach(([key, section]) => {
    const completedInSection = section.modules.filter(m => completedModules.includes(m.id)).length;

    html += `
      <div class="section-block" data-section="${key}">
        <div class="section-header">
          <div class="section-icon ${section.color}">${section.icon}</div>
          <div>
            <div class="section-title">${section.title} <span style="font-family:'JetBrains Mono';font-size:0.75rem;color:var(--text-dim);margin-left:8px;">${completedInSection}/${section.modules.length}</span></div>
            <div class="section-subtitle">${section.subtitle}</div>
          </div>
        </div>
        <div class="modules-grid">
          ${section.modules.map(m => {
            const isCompleted = completedModules.includes(m.id);
            return `
              <div class="module-card ${isCompleted ? 'completed' : ''}" onclick="openPanel('${m.id}')">
                <div class="module-top">
                  <span class="module-number">M${m.num}</span>
                  <span class="module-duration">⏱ ${m.duration}</span>
                </div>
                <div class="module-title">${m.title}</div>
                <div class="module-desc">${m.desc}</div>
                <div class="module-footer">
                  <div class="module-tags">
                    ${m.tags.map(t => `<span class="module-tag ${t.color}">${t.label}</span>`).join('')}
                  </div>
                  <div class="module-check ${isCompleted ? 'checked' : ''}" onclick="toggleModule('${m.id}', event)">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// Tab navigation
document.getElementById('navTabs').addEventListener('click', (e) => {
  if (!e.target.classList.contains('nav-tab')) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  activeSection = e.target.dataset.section;
  renderContent();
});

// Close panel on overlay click
document.getElementById('expandedPanel').addEventListener('click', (e) => {
  if (e.target === document.getElementById('expandedPanel')) closePanel();
});

// Close panel on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
});

// Init
updateProgress();
renderContent();
</script>
